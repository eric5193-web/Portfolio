<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poyuan (Eric) Wang — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #0a0a0a;
      --surface:      #111111;
      --surface-2:    #161616;
      --border:       #1e1e1e;
      --accent:       #2B00FF;
      --accent-hover: #4d2dff;
      --text:         #f0f0f0;
      --text-muted:   #888888;
      --font:         'Inter', system-ui, sans-serif;
      --max-w:        1100px;
      --section-pad:  100px 24px;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    /* ── Nav ───────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    nav .logo {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 32px;
    }
    nav ul a {
      font-size: 13px;
      color: var(--text-muted);
      transition: color 0.2s;
      letter-spacing: 0.04em;
    }
    nav ul a:hover { color: var(--text); }

    /* ── Hero ─────────────────────────────────────── */
    #hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 60px;
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 120px 24px 60px;
    }
    #hero .hero-text { }
    #hero .eyebrow {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
    }
    #hero h1 {
      font-size: clamp(2.4rem, 5vw, 4rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 20px;
    }
    #hero .subtitle {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.7;
      max-width: 420px;
      margin-bottom: 36px;
    }
    #hero .cta-group { display: flex; gap: 14px; flex-wrap: wrap; }
    .btn-primary {
      display: inline-block;
      padding: 12px 28px;
      background: var(--accent);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      border-radius: 6px;
      letter-spacing: 0.04em;
      transition: background 0.2s, transform 0.2s;
    }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); }
    .btn-outline {
      display: inline-block;
      padding: 12px 28px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      border-radius: 6px;
      letter-spacing: 0.04em;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-outline:hover { border-color: var(--text-muted); color: var(--text); }
    #hero .hero-image {
      display: flex;
      justify-content: center;
    }
    #hero .hero-image img {
      width: 380px;
      height: 480px;
      object-fit: cover;
      object-position: top;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 0 60px rgba(43,0,255,0.15);
    }

    /* ── Reveal animation ──────────────────────────── */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
    @media (prefers-reduced-motion: reduce) {
      .reveal {
        opacity: 1;
        transform: none;
        transition: none;
      }
    }
  </style>
</head>
<body>

  <nav aria-label="Primary">
    <a href="#" class="logo" aria-label="Eric Wang — home">Eric Wang</a>
    <ul>
      <li><a href="#about">About</a></li>
      <li><a href="#internship">Internship</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#media">Media</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <section id="hero">
    <div class="hero-text">
      <p class="eyebrow reveal">NYU Integrated Marketing · silueta.ai</p>
      <h1 class="reveal" style="transition-delay:0.1s">Poyuan<br>(Eric) Wang</h1>
      <p class="subtitle reveal" style="transition-delay:0.2s">
        Marketing Analytics &amp; AI-Augmented Brand Strategy.<br>
        Compressing team workflows into single-operator pipelines.
      </p>
      <div class="cta-group reveal" style="transition-delay:0.3s">
        <a href="#internship" class="btn-primary">View Work</a>
        <a href="#contact" class="btn-outline">Get in Touch</a>
      </div>
    </div>
    <div class="hero-image reveal" style="transition-delay:0.2s">
      <img src="assets/eric-headshot.png" alt="Poyuan (Eric) Wang">
    </div>
  </section>

  <!-- sections go here -->

  <script>
    // Scroll reveal
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>

</body>
</html>
